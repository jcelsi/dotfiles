# Starship prompt configuration
# https://starship.rs

palette = "tokyonight_night"

[character]
success_symbol = "[ ](fg:green)[ ❯](fg:blue)"
error_symbol = "[ ](fg:red)[ ❯](fg:red)"

[git_branch]
symbol = " "
style = "bold fg:purple"

[git_status]
style = "fg:orange"

[directory]
truncation_length = 4
style = "bold fg:blue"
read_only = " 󰌾"

[nodejs]
symbol = " "

[python]
symbol = " "

[rust]
symbol = " "

[golang]
symbol = " "

[package]
symbol = "󰏗 "

[docker_context]
symbol = " "
disabled = true

[memory_usage]
symbol = "󰍛 "

[time]
disabled = false
format = "[$time]($style) "
style = "fg:comment"

# Disable cloud modules
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[kubernetes]
disabled = true

[terraform]
disabled = true

[pulumi]
disabled = true

[vagrant]
disabled = true

[palettes.tokyonight_night]
# Night variant colors
bg          = "#1a1b26"
bg_dark     = "#16161e"
bg_highlight = "#292e42"
terminal_black = "#414868"
fg          = "#c0caf5"
fg_dark     = "#a9b1d6"
fg_gutter   = "#3b4261"
comment     = "#565f89"
blue        = "#7aa2f7"
cyan        = "#7dcfff"
blue1       = "#2ac3de"
blue2       = "#0db9d7"
blue5       = "#89ddff"
blue6       = "#b4f9f8"
blue7       = "#394b70"
magenta     = "#bb9af7"
purple      = "#9d7cd8"
orange      = "#ff9e64"
yellow      = "#e0af68"
green       = "#9ece6a"
green1      = "#73daca"
green2      = "#41a6b5"
teal        = "#1abc9c"
red         = "#f7768e"
red1        = "#db4b4b"
